[options]
; Rutas de addons para Enterprise y Community
addons_path = /opt/odoo/odoo/addons,/opt/odoo/addons
data_dir = /var/lib/odoo
admin_passwd = ${ADMIN_PASSWORD}

; --- CONFIGURACIÓN DE RENDIMIENTO ---
; Workers = (CPUs * 2) + 1. Ajusta según tu servidor en Coolify
workers = 3
max_cron_threads = 1

; Límites de memoria para evitar fugas (ajustar según RAM disponible)
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_request = 8192
limit_time_cpu = 600
limit_time_real = 1200

; --- SEGURIDAD Y RED ---
db_host = db
db_user = odoo
db_password = ${POSTGRES_PASSWORD}
db_port = 5432
proxy_mode = True
xmlrpc_interface = 0.0.0.0
netrpc_interface = 0.0.0.0
