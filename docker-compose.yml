version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: odoo19-enterprise-prod:latest
    restart: always
    depends_on:
      - db
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=${POSTGRES_PASSWORD}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    volumes:
      - odoo-data:/var/lib/odoo
    # Coolify detectará automáticamente el puerto 8069
    networks:
      - coolify-network

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=odoo
      - PGDATA=/var/lib/postgresql/data/pgdata
    # Optimización de DB para Odoo
    command: >
      postgres -c 'max_connections=100' 
               -c 'shared_buffers=512MB' 
               -c 'work_mem=32MB'
    volumes:
      - odoo-db-data:/var/lib/postgresql/data/pgdata
    networks:
      - coolify-network

volumes:
  odoo-data:
  odoo-db-data:

networks:
  coolify-network:
    external: true
